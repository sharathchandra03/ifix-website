<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="battBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="chargeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34c659"/>
      <stop offset="60%" stop-color="#3478F6"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Battery outer shell shadow -->
  <rect x="52" y="82" width="298" height="196" rx="12" fill="rgba(0,0,0,0.2)" transform="translate(4,5)"/>
  <!-- Battery outer shell -->
  <rect x="52" y="82" width="298" height="196" rx="12" fill="url(#battBody)" stroke="#444" stroke-width="1.5"/>
  <!-- Connector tab -->
  <rect x="350" y="158" width="18" height="44" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <rect x="354" y="166" width="10" height="28" rx="2" fill="#444"/>
  <!-- Inner cells (6 cell battery) -->
  <g>
    <rect x="66" y="96" width="86" height="168" rx="6" fill="url(#cellGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
    <text x="109" y="186" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="9" font-weight="bold">CELL 1</text>
    <text x="109" y="198" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="7">3.8V</text>
  </g>
  <g>
    <rect x="158" y="96" width="86" height="168" rx="6" fill="url(#cellGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
    <text x="201" y="186" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="9" font-weight="bold">CELL 2</text>
    <text x="201" y="198" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="7">3.8V</text>
  </g>
  <g>
    <rect x="250" y="96" width="86" height="168" rx="6" fill="url(#cellGrad)" stroke="#2a4a7a" stroke-width="1.5"/>
    <text x="293" y="186" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="9" font-weight="bold">CELL 3</text>
    <text x="293" y="198" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="7">3.8V</text>
  </g>
  <!-- Cell lightning bolt icons -->
  <text x="109" y="162" text-anchor="middle" fill="#34c659" font-size="22" opacity="0.8">⚡</text>
  <text x="201" y="162" text-anchor="middle" fill="#34c659" font-size="22" opacity="0.8">⚡</text>
  <text x="293" y="162" text-anchor="middle" fill="#34c659" font-size="22" opacity="0.8">⚡</text>
  <!-- Charge level bars -->
  <rect x="74" y="108" width="70" height="10" rx="5" fill="#111"/>
  <rect x="74" y="108" width="56" height="10" rx="5" fill="url(#chargeBar)" opacity="0.9"/>
  <rect x="166" y="108" width="70" height="10" rx="5" fill="#111"/>
  <rect x="166" y="108" width="70" height="10" rx="5" fill="url(#chargeBar)" opacity="0.9"/>
  <rect x="258" y="108" width="70" height="10" rx="5" fill="#111"/>
  <rect x="258" y="108" width="45" height="10" rx="5" fill="url(#chargeBar)" opacity="0.9"/>
  <!-- BMS chip at bottom -->
  <rect x="120" y="290" width="160" height="40" rx="6" fill="#1a1a2a" stroke="#3478F6" stroke-width="1.5"/>
  <text x="200" y="308" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="9" font-weight="bold">BATTERY MANAGEMENT</text>
  <text x="200" y="321" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="8">6000 mAh · 11.4V · 74.9Wh</text>
  <!-- Apple logo style mark -->
  <text x="200" y="80" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">MacBook Pro 13" Replacement Battery</text>
  <!-- Adhesive tabs indicator -->
  <rect x="80" y="270" width="30" height="8" rx="2" fill="#ff9500" opacity="0.8"/>
  <rect x="120" y="270" width="30" height="8" rx="2" fill="#ff9500" opacity="0.8"/>
  <rect x="160" y="270" width="30" height="8" rx="2" fill="#ff9500" opacity="0.8"/>
  <rect x="200" y="270" width="30" height="8" rx="2" fill="#ff9500" opacity="0.8"/>
  <text x="200" y="268" text-anchor="middle" fill="#ff9500" font-family="sans-serif" font-size="7.5">▲ Adhesive Pull Tabs</text>
  <!-- Label -->
  <text x="200" y="390" text-anchor="middle" fill="#3478F6" font-family="sans-serif" font-size="11" font-weight="600">MacBook Pro 13" Battery — 6000 mAh</text>
</svg>
