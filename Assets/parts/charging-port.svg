<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="flexBoard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="100%" stop-color="#0d2b0d"/>
    </linearGradient>
    <linearGradient id="portMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <linearGradient id="portInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Flex PCB board -->
  <rect x="70" y="80" width="260" height="240" rx="8" fill="url(#flexBoard)" stroke="#2a5a2a" stroke-width="2"/>
  <!-- PCB traces -->
  <g stroke="#b8860b" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="200" y1="80" x2="200" y2="320"/>
    <line x1="70" y1="200" x2="330" y2="200"/>
    <path d="M130 200 Q130 240 160 260 Q180 270 200 270"/>
    <path d="M270 200 Q270 240 240 260 Q220 270 200 270"/>
    <line x1="150" y1="80" x2="150" y2="140"/>
    <line x1="250" y1="80" x2="250" y2="140"/>
  </g>
  <!-- USB-C port body -->
  <rect x="152" y="150" width="96" height="100" rx="6" fill="url(#portMetal)" stroke="#888" stroke-width="2"/>
  <!-- USB-C opening -->
  <rect x="162" y="162" width="76" height="76" rx="20" fill="url(#portInner)" stroke="#555" stroke-width="1"/>
  <!-- USB-C inner tongue -->
  <rect x="175" y="190" width="50" height="20" rx="3" fill="#666"/>
  <!-- USB-C contact pins -->
  <g fill="#b8860b">
    <rect x="178" y="193" width="4" height="6" rx="1"/>
    <rect x="185" y="193" width="4" height="6" rx="1"/>
    <rect x="192" y="193" width="4" height="6" rx="1"/>
    <rect x="199" y="193" width="4" height="6" rx="1"/>
    <rect x="206" y="193" width="4" height="6" rx="1"/>
    <rect x="213" y="193" width="4" height="6" rx="1"/>
    <rect x="178" y="201" width="4" height="6" rx="1"/>
    <rect x="185" y="201" width="4" height="6" rx="1"/>
    <rect x="192" y="201" width="4" height="6" rx="1"/>
    <rect x="199" y="201" width="4" height="6" rx="1"/>
    <rect x="206" y="201" width="4" height="6" rx="1"/>
    <rect x="213" y="201" width="4" height="6" rx="1"/>
  </g>
  <!-- Port screws -->
  <circle cx="162" cy="160" r="5" fill="#999" stroke="#777" stroke-width="1"/>
  <line x1="159" y1="160" x2="165" y2="160" stroke="#555" stroke-width="1.5"/>
  <line x1="162" y1="157" x2="162" y2="163" stroke="#555" stroke-width="1.5"/>
  <circle cx="238" cy="160" r="5" fill="#999" stroke="#777" stroke-width="1"/>
  <line x1="235" y1="160" x2="241" y2="160" stroke="#555" stroke-width="1.5"/>
  <line x1="238" y1="157" x2="238" y2="163" stroke="#555" stroke-width="1.5"/>
  <circle cx="162" cy="240" r="5" fill="#999" stroke="#777" stroke-width="1"/>
  <line x1="159" y1="240" x2="165" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="162" y1="237" x2="162" y2="243" stroke="#555" stroke-width="1.5"/>
  <circle cx="238" cy="240" r="5" fill="#999" stroke="#777" stroke-width="1"/>
  <line x1="235" y1="240" x2="241" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="238" y1="237" x2="238" y2="243" stroke="#555" stroke-width="1.5"/>
  <!-- Mic module next to port -->
  <circle cx="120" cy="200" r="14" fill="#1a1a2a" stroke="#3478F6" stroke-width="1.5"/>
  <circle cx="120" cy="200" r="7" fill="#0a0a1a"/>
  <circle cx="120" cy="200" r="3" fill="#3478F6" opacity="0.5"/>
  <text x="120" y="224" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="7">MIC</text>
  <!-- Small chip on board -->
  <rect x="270" y="174" width="40" height="52" rx="3" fill="#1a1a2a" stroke="#555" stroke-width="1"/>
  <text x="290" y="204" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="7">CHRG</text>
  <text x="290" y="214" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="6">IC</text>
  <!-- Flex connector ribbon at top -->
  <rect x="160" y="60" width="80" height="22" rx="3" fill="#0d1a0d" stroke="#2a5a2a" stroke-width="1"/>
  <g stroke="#b8860b" stroke-width="1" opacity="0.8">
    <line x1="168" y1="60" x2="168" y2="82"/>
    <line x1="174" y1="60" x2="174" y2="82"/>
    <line x1="180" y1="60" x2="180" y2="82"/>
    <line x1="186" y1="60" x2="186" y2="82"/>
    <line x1="192" y1="60" x2="192" y2="82"/>
    <line x1="198" y1="60" x2="198" y2="82"/>
    <line x1="204" y1="60" x2="204" y2="82"/>
    <line x1="210" y1="60" x2="210" y2="82"/>
    <line x1="216" y1="60" x2="216" y2="82"/>
    <line x1="222" y1="60" x2="222" y2="82"/>
    <line x1="228" y1="60" x2="228" y2="82"/>
    <line x1="234" y1="60" x2="234" y2="82"/>
  </g>
  <!-- USB-C symbol badge -->
  <rect x="157" y="284" width="86" height="20" rx="10" fill="#3478F6"/>
  <text x="200" y="297" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9" font-weight="bold">USB-C · OEM</text>
  <!-- Label -->
  <text x="200" y="376" text-anchor="middle" fill="#3478F6" font-family="sans-serif" font-size="11" font-weight="600">Samsung Galaxy Charging Port Flex</text>
  <text x="200" y="390" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">S21 / S22 Series</text>
</svg>
