<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Phone body shadow -->
  <rect x="122" y="32" width="158" height="336" rx="38" fill="rgba(0,0,0,0.18)" transform="translate(4,6)"/>
  <!-- Phone body -->
  <rect x="122" y="32" width="158" height="336" rx="38" fill="url(#bezel)" stroke="#444" stroke-width="1.5"/>
  <!-- Screen area -->
  <rect x="134" y="44" width="134" height="312" rx="30" fill="url(#screenGrad)"/>
  <!-- Dynamic Island -->
  <rect x="173" y="58" width="56" height="20" rx="10" fill="#000"/>
  <!-- Status bar icons -->
  <text x="148" y="70" fill="white" font-family="sans-serif" font-size="8" font-weight="bold">9:41</text>
  <rect x="344" y="66" width="8" height="5" rx="1" fill="none" stroke="white" stroke-width="1" opacity="0.8"/>
  <!-- UI content on screen -->
  <rect x="148" y="90" width="106" height="60" rx="8" fill="rgba(255,255,255,0.08)"/>
  <circle cx="174" cy="115" r="16" fill="#3478F6" opacity="0.8"/>
  <text x="174" y="120" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14">📱</text>
  <rect x="196" y="104" width="50" height="7" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="196" y="116" width="38" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="196" y="126" width="44" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- App grid -->
  <g opacity="0.7">
    <rect x="148" y="164" width="22" height="22" rx="5" fill="#3478F6"/>
    <rect x="176" y="164" width="22" height="22" rx="5" fill="#34c659"/>
    <rect x="204" y="164" width="22" height="22" rx="5" fill="#ff9500"/>
    <rect x="232" y="164" width="22" height="22" rx="5" fill="#ff3b30"/>
    <rect x="148" y="192" width="22" height="22" rx="5" fill="#5856d6"/>
    <rect x="176" y="192" width="22" height="22" rx="5" fill="#ff2d55"/>
    <rect x="204" y="192" width="22" height="22" rx="5" fill="#007aff"/>
    <rect x="232" y="192" width="22" height="22" rx="5" fill="#4cd964"/>
  </g>
  <!-- Home indicator -->
  <rect x="173" y="340" width="56" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Screen shine -->
  <rect x="134" y="44" width="134" height="312" rx="30" fill="url(#shine)"/>
  <!-- Flex ribbon at bottom -->
  <rect x="172" y="368" width="58" height="14" rx="2" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <g stroke="#b8860b" stroke-width="0.8" opacity="0.8">
    <line x1="178" y1="368" x2="178" y2="382"/>
    <line x1="183" y1="368" x2="183" y2="382"/>
    <line x1="188" y1="368" x2="188" y2="382"/>
    <line x1="193" y1="368" x2="193" y2="382"/>
    <line x1="198" y1="368" x2="198" y2="382"/>
    <line x1="203" y1="368" x2="203" y2="382"/>
    <line x1="208" y1="368" x2="208" y2="382"/>
    <line x1="213" y1="368" x2="213" y2="382"/>
    <line x1="218" y1="368" x2="218" y2="382"/>
    <line x1="223" y1="368" x2="223" y2="382"/>
  </g>
  <!-- OLED badge -->
  <rect x="148" y="220" width="48" height="18" rx="9" fill="#3478F6"/>
  <text x="172" y="232" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="bold">OLED</text>
  <!-- Label -->
  <text x="200" y="396" text-anchor="middle" fill="#3478F6" font-family="sans-serif" font-size="11" font-weight="600">iPhone 14 OLED Screen Assembly</text>
</svg>
