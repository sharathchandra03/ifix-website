<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="fanFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#f0f4f8"/>

  <!-- Fan housing shadow -->
  <rect x="72" y="72" width="256" height="256" rx="20" fill="rgba(0,0,0,0.2)" transform="translate(5,6)"/>
  <!-- Fan housing frame -->
  <rect x="72" y="72" width="256" height="256" rx="20" fill="url(#fanFrame)" stroke="#444" stroke-width="2"/>
  <!-- Inner grid/grill bars horizontal -->
  <g stroke="#2a2a2a" stroke-width="1.5" opacity="0.5">
    <line x1="72" y1="100" x2="328" y2="100"/>
    <line x1="72" y1="116" x2="328" y2="116"/>
    <line x1="72" y1="132" x2="328" y2="132"/>
    <line x1="72" y1="268" x2="328" y2="268"/>
    <line x1="72" y1="284" x2="328" y2="284"/>
    <line x1="72" y1="300" x2="328" y2="300"/>
    <line x1="100" y1="72" x2="100" y2="328"/>
    <line x1="116" y1="72" x2="116" y2="328"/>
    <line x1="132" y1="72" x2="132" y2="328"/>
    <line x1="268" y1="72" x2="268" y2="328"/>
    <line x1="284" y1="72" x2="284" y2="328"/>
    <line x1="300" y1="72" x2="300" y2="328"/>
  </g>
  <!-- Fan blade area circle -->
  <circle cx="200" cy="200" r="108" fill="#1a1a1a"/>
  <!-- Fan blades (7 blades) -->
  <g transform="translate(200,200)">
    <!-- Blade 1 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9"/>
    <!-- Blade 2 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(51.4)"/>
    <!-- Blade 3 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(102.8)"/>
    <!-- Blade 4 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(154.2)"/>
    <!-- Blade 5 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(205.6)"/>
    <!-- Blade 6 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(257)"/>
    <!-- Blade 7 -->
    <path d="M0 -30 C10 -60 50 -80 70 -50 C50 -20 20 -10 0 0 Z" fill="url(#bladeGrad)" stroke="#555" stroke-width="0.5" opacity="0.9" transform="rotate(308.4)"/>
  </g>
  <!-- Fan hub center -->
  <circle cx="200" cy="200" r="28" fill="url(#hubGrad)" stroke="#555" stroke-width="2"/>
  <circle cx="200" cy="200" r="16" fill="#111" stroke="#444" stroke-width="1"/>
  <circle cx="200" cy="200" r="5" fill="#3478F6" opacity="0.8"/>
  <!-- Motor label ring -->
  <circle cx="200" cy="200" r="22" fill="none" stroke="#3478F6" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Mounting holes corners -->
  <circle cx="98" cy="98" r="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="302" cy="98" r="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="98" cy="302" r="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="302" cy="302" r="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="98" cy="98" r="3" fill="#333"/>
  <circle cx="302" cy="98" r="3" fill="#333"/>
  <circle cx="98" cy="302" r="3" fill="#333"/>
  <circle cx="302" cy="302" r="3" fill="#333"/>

  <!-- Power cable (3-pin/4-pin connector) -->
  <rect x="170" y="336" width="60" height="20" rx="3" fill="#1a1a2a" stroke="#3478F6" stroke-width="1.5"/>
  <g fill="#b8860b">
    <rect x="178" y="340" width="6" height="12" rx="1"/>
    <rect x="188" y="340" width="6" height="12" rx="1"/>
    <rect x="198" y="340" width="6" height="12" rx="1"/>
    <rect x="208" y="340" width="6" height="12" rx="1"/>
  </g>
  <text x="200" y="332" text-anchor="middle" fill="#6a9fd8" font-family="monospace" font-size="7">4-PIN PWM</text>

  <!-- Spec badges -->
  <rect x="82" y="316" width="68" height="18" rx="9" fill="#3478F6"/>
  <text x="116" y="328" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="bold">DC 5V</text>
  <rect x="250" y="316" width="68" height="18" rx="9" fill="#34c659"/>
  <text x="284" y="328" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="bold">QUIET</text>

  <!-- Motion lines for spin effect -->
  <g stroke="#3478F6" stroke-width="1" opacity="0.15">
    <circle cx="200" cy="200" r="60" fill="none" stroke-dasharray="6,6"/>
    <circle cx="200" cy="200" r="80" fill="none" stroke-dasharray="8,8"/>
    <circle cx="200" cy="200" r="95" fill="none" stroke-dasharray="10,10"/>
  </g>

  <!-- Label -->
  <text x="200" y="376" text-anchor="middle" fill="#3478F6" font-family="sans-serif" font-size="11" font-weight="600">Laptop Cooling Fan (DC 5V Dual Ball)</text>
  <text x="200" y="390" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9">Dell / HP / Lenovo Compatible</text>
</svg>
