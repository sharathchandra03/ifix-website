<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="pcb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="100%" stop-color="#0d2b0d"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- PCB Board -->
  <rect x="40" y="40" width="320" height="320" rx="8" fill="url(#pcb)" stroke="#2a5a2a" stroke-width="2"/>
  <!-- Gold traces -->
  <g stroke="#b8860b" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="100" y1="40" x2="100" y2="360"/>
    <line x1="160" y1="40" x2="160" y2="360"/>
    <line x1="240" y1="40" x2="240" y2="360"/>
    <line x1="300" y1="40" x2="300" y2="360"/>
    <line x1="40" y1="100" x2="360" y2="100"/>
    <line x1="40" y1="160" x2="360" y2="160"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
    <line x1="40" y1="300" x2="360" y2="300"/>
    <!-- connector traces -->
    <path d="M100 160 Q130 160 130 200 Q130 240 160 240"/>
    <path d="M240 100 Q240 130 200 130 Q160 130 160 160"/>
    <path d="M300 240 Q300 270 270 270 Q240 270 240 300"/>
  </g>
  <!-- CPU Socket -->
  <rect x="145" y="145" width="110" height="110" rx="4" fill="#2a2a2a" stroke="#b8860b" stroke-width="2"/>
  <rect x="155" y="155" width="90" height="90" rx="2" fill="url(#chip)" stroke="#444" stroke-width="1"/>
  <text x="200" y="202" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="10" font-weight="bold">CPU</text>
  <text x="200" y="214" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="7">i5-10400</text>
  <!-- CPU pins -->
  <g fill="#b8860b">
    <rect x="147" y="148" width="3" height="3"/>
    <rect x="153" y="148" width="3" height="3"/>
    <rect x="159" y="148" width="3" height="3"/>
    <rect x="165" y="148" width="3" height="3"/>
    <rect x="171" y="148" width="3" height="3"/>
    <rect x="177" y="148" width="3" height="3"/>
    <rect x="183" y="148" width="3" height="3"/>
    <rect x="189" y="148" width="3" height="3"/>
    <rect x="195" y="148" width="3" height="3"/>
    <rect x="201" y="148" width="3" height="3"/>
    <rect x="207" y="148" width="3" height="3"/>
    <rect x="213" y="148" width="3" height="3"/>
    <rect x="219" y="148" width="3" height="3"/>
    <rect x="225" y="148" width="3" height="3"/>
    <rect x="231" y="148" width="3" height="3"/>
    <rect x="237" y="148" width="3" height="3"/>
    <rect x="243" y="148" width="3" height="3"/>
    <rect x="249" y="148" width="3" height="3"/>
  </g>
  <!-- RAM slots -->
  <rect x="58" y="120" width="20" height="90" rx="2" fill="#1a1a4a" stroke="#3478F6" stroke-width="1.5"/>
  <rect x="82" y="120" width="20" height="90" rx="2" fill="#0a2a4a" stroke="#3478F6" stroke-width="1" opacity="0.6"/>
  <text x="68" y="168" text-anchor="middle" fill="#3478F6" font-family="monospace" font-size="6" transform="rotate(-90 68 168)">DDR4</text>
  <!-- Capacitors row -->
  <g fill="#c8a000" stroke="#8a6000" stroke-width="0.5">
    <rect x="280" y="80" width="10" height="14" rx="2"/>
    <rect x="296" y="80" width="10" height="14" rx="2"/>
    <rect x="312" y="80" width="10" height="14" rx="2"/>
    <rect x="328" y="80" width="10" height="14" rx="2"/>
  </g>
  <!-- Small chips -->
  <rect x="58" y="60" width="45" height="30" rx="2" fill="url(#chip)" stroke="#555" stroke-width="1"/>
  <text x="80" y="79" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="7">BIOS</text>
  <rect x="270" y="170" width="50" height="35" rx="2" fill="url(#chip)" stroke="#555" stroke-width="1"/>
  <text x="295" y="191" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="7">PCH</text>
  <!-- PCIe slots -->
  <rect x="55" y="280" width="180" height="12" rx="2" fill="#111" stroke="#3478F6" stroke-width="1.5"/>
  <rect x="55" y="300" width="120" height="8" rx="2" fill="#111" stroke="#3478F6" stroke-width="1" opacity="0.6"/>
  <rect x="55" y="316" width="120" height="8" rx="2" fill="#111" stroke="#3478F6" stroke-width="1" opacity="0.5"/>
  <!-- Mounting holes -->
  <circle cx="58" cy="58" r="6" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="342" cy="58" r="6" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="58" cy="342" r="6" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="342" cy="342" r="6" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <!-- Label -->
  <text x="200" y="388" text-anchor="middle" fill="#3478F6" font-family="sans-serif" font-size="11" font-weight="600">Laptop Motherboard — Intel i5 Gen 10</text>
</svg>
